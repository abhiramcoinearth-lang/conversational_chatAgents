# Production stack for the Chat Agent Platform.
# LLM is now Google Gemini (API-only) — no GPU host needed.
#
#   caddy    -> HTTPS termination for chat.chatbucket.chat, reverse-proxies to app
#   app      -> FastAPI (this repo's Dockerfile), calls Gemini via API key
#   redis    -> session memory
#   postgres -> conversation logs
#
# Build context for `app` is the cloned repo (../repo). Secrets come from ./.env.

services:
  app:
    # Immutable image built + pushed by CI to Amazon ECR. IMAGE_TAG (a git SHA)
    # is set in .env by the deploy job; falls back to :latest.
    image: 637560253183.dkr.ecr.ap-south-1.amazonaws.com/conversational-chatagents:${IMAGE_TAG:-latest}
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 5000 --workers 2
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatagent
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - API_SECRET_KEY=${API_SECRET_KEY}
      - RATE_LIMIT=60/minute
      - MAX_MEMORY_TURNS=20
      - DEBUG=false
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)\""]
      interval: 30s
      timeout: 6s
      retries: 5
      start_period: 40s
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: /chatagent/app
        awslogs-stream: app
        awslogs-create-group: "true"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatagent"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  app_data:
  redis_data:
  postgres_data:
  caddy_data:
  caddy_config:
