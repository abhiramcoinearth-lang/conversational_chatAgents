name: CI/CD

# Full pipeline:
#   lint  -> ruff static analysis
#   test  -> pytest unit suite (integration tests excluded)
#   build -> Docker image build validation (buildx + layer cache)
#   deploy-> (main pushes only) sync to EC2, rebuild + restart, smoke + e2e test
#
# CI (lint/test/build) runs on every push and pull request. Deploy runs only
# after CI passes, and only on pushes to main.
#
# Required repo secrets: SSH_HOST, SSH_PRIVATE_KEY, SSH_USER (see README/infra).

on:
  push:
    paths-ignore: ['infra/**', '**.md']
  pull_request:
    paths-ignore: ['infra/**', '**.md']
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  # Cancel superseded runs on feature branches; never cancel an in-flight main run.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write   # push/pull the app image to GHCR

env:
  IMAGE: ghcr.io/abhiramcoinearth-lang/conversational_chatagents

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff==0.6.9
      - name: Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Pytest (unit)
        run: pytest -m "not integration" -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Build once here. Push to GHCR on main (deploy pulls it); PRs build only.
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to instance
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'data' --exclude 'frontend/dashboard/node_modules' \
            -e "ssh -i $HOME/.ssh/deploy_key -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/chatagent/repo/"

      - name: Pull image + restart stack
        run: |
          ssh -i "$HOME/.ssh/deploy_key" \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'EOF'
          set -euo pipefail
          # Authenticate to GHCR to pull the private app image (ephemeral token).
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          # Sync deploy config from the repo into the runtime dir (keeps local .env).
          cp /opt/chatagent/repo/deploy/docker-compose.prod.yml /opt/chatagent/deploy/docker-compose.prod.yml
          cp /opt/chatagent/repo/deploy/Caddyfile /opt/chatagent/deploy/Caddyfile
          cd /opt/chatagent/deploy
          # Pin the app image to the commit CI just built + pushed.
          if grep -q '^IMAGE_TAG=' .env; then
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
          fi
          docker compose -f docker-compose.prod.yml pull app
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml ps
          docker logout ghcr.io || true
          EOF

      - name: Smoke test /health
        run: |
          sleep 15
          curl -fsS "https://chat.chatbucket.chat/health" | tee /dev/stderr

      - name: E2E chat test
        run: |
          body=$(curl -fsS -m 120 -X POST "https://chat.chatbucket.chat/api/chat" \
            -H "Content-Type: application/json" \
            -d '{"message":"pipeline e2e check","sector":"retail","src_lang":"ENGLISH","lang":"ENGLISH"}')
          echo "$body"
          echo "$body" | grep -q '"reply"' || { echo "no reply in response"; exit 1; }
