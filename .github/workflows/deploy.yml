name: CI/CD

# Full pipeline:
#   lint  -> ruff static analysis
#   test  -> pytest unit suite (integration tests excluded)
#   build -> Docker image build validation (buildx + layer cache)
#   deploy-> (main pushes only) sync to EC2, rebuild + restart, smoke + e2e test
#
# CI (lint/test/build) runs on every push and pull request. Deploy runs only
# after CI passes, and only on pushes to main.
#
# Required repo secrets: SSH_HOST, SSH_PRIVATE_KEY, SSH_USER (see README/infra).

on:
  push:
    paths-ignore: ['infra/**', '**.md']
  pull_request:
    paths-ignore: ['infra/**', '**.md']
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  # Cancel superseded runs on feature branches; never cancel an in-flight main run.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write   # assume the AWS role via GitHub OIDC (push to ECR)

env:
  AWS_REGION: ap-south-1
  AWS_ROLE: arn:aws:iam::637560253183:role/chatagent-gha-ecr
  ECR_REGISTRY: 637560253183.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE: 637560253183.dkr.ecr.ap-south-1.amazonaws.com/conversational-chatagents

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff==0.6.9
      - name: Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Pytest (unit)
        run: pytest -m "not integration" -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials (OIDC)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Log in to Amazon ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: aws-actions/amazon-ecr-login@v2
      # Build once here. Push to ECR on main (deploy pulls it); PRs build only.
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to instance
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'data' --exclude 'frontend/dashboard/node_modules' \
            -e "ssh -i $HOME/.ssh/deploy_key -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/chatagent/repo/"

      - name: Pull image + restart stack
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # An empty secret would silently deploy an app with no LLM credential,
          # which only shows up later as a 500 from /api/chat.
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY repo secret is empty or unset — refusing to deploy."
            exit 1
          fi
          ssh -i "$HOME/.ssh/deploy_key" \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "GEMINI_API_KEY='$GEMINI_API_KEY' bash -s" <<'EOF'
          set -euo pipefail
          # Authenticate to ECR using the instance's IAM role (no static creds).
          aws ecr get-login-password --region ap-south-1 \
            | docker login --username AWS --password-stdin 637560253183.dkr.ecr.ap-south-1.amazonaws.com
          # Sync deploy config from the repo into the runtime dir (keeps local .env).
          cp /opt/chatagent/repo/deploy/docker-compose.prod.yml /opt/chatagent/deploy/docker-compose.prod.yml
          cp /opt/chatagent/repo/deploy/Caddyfile /opt/chatagent/deploy/Caddyfile
          cd /opt/chatagent/deploy
          # Pin the app image to the commit CI just built + pushed.
          if grep -q '^IMAGE_TAG=' .env; then
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
          fi
          # Keep the LLM credential in sync with the repo secret (rewrite, don't duplicate).
          touch .env
          grep -v '^GEMINI_API_KEY=' .env > .env.tmp || true
          printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" >> .env.tmp
          mv .env.tmp .env
          chmod 600 .env
          docker compose -f docker-compose.prod.yml pull app
          # --remove-orphans drops the retired llama.cpp container.
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.prod.yml ps
          docker logout 637560253183.dkr.ecr.ap-south-1.amazonaws.com || true
          EOF

      - name: Smoke test /health
        run: |
          sleep 15
          health=$(curl -fsS "https://chat.chatbucket.chat/health")
          echo "$health"
          # "degraded" means the app is up but can't reach Gemini (bad/missing
          # API key). Fail here rather than letting the e2e test 500 opaquely.
          echo "$health" | grep -q '"llm_status":"connected"' || {
            echo "::error::LLM is disconnected — check the GEMINI_API_KEY secret and that the Generative Language API is enabled."
            exit 1
          }

      - name: E2E chat test
        run: |
          # -f is deliberately omitted: on a 5xx we want the response body in
          # the log, not just "curl: (22)".
          code=$(curl -sS -m 120 -o /tmp/chat.json -w '%{http_code}' \
            -X POST "https://chat.chatbucket.chat/api/chat" \
            -H "Content-Type: application/json" \
            -d '{"message":"pipeline e2e check","sector":"retail","src_lang":"ENGLISH","lang":"ENGLISH"}')
          echo "HTTP $code"
          cat /tmp/chat.json; echo
          [ "$code" = "200" ] || { echo "::error::/api/chat returned HTTP $code"; exit 1; }
          grep -q '"reply"' /tmp/chat.json || { echo "no reply in response"; exit 1; }
